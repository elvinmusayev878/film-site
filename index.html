
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Elvin Cinema</title>

<style>

body{
margin:0;
background:#141414;
font-family:Arial;
color:white;
}

header{
background:black;
padding:20px;
font-size:30px;
color:red;
text-align:center;
font-weight:bold;
}

.search{
text-align:center;
margin:20px;
}

.search input{
padding:12px;
width:320px;
border-radius:6px;
border:none;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:20px;
padding:20px;
justify-content:center;
}

.card{
background:#1f1f1f;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.07);
}

.card img{
width:100%;
}

.card p{
padding:10px;
font-size:14px;
}

.player{
width:90%;
height:500px;
margin:auto;
display:block;
margin-top:20px;
border:none;
}

</style>

</head>

<body>

<header>ELVIN CINEMA 🎬</header>

<div class="search">
<input type="text" id="search" placeholder="Film axtar...">
</div>

<iframe class="player" id="player" allowfullscreen></iframe>

<div class="grid" id="movies"></div>

<script>

const apiKey="e19de15060a15796f5abd7546cd21dfe";

const moviesDiv=document.getElementById("movies");
const player=document.getElementById("player");

function loadMovies(url){

fetch(url)
.then(res=>res.json())
.then(data=>{

moviesDiv.innerHTML="";

data.results.forEach(movie=>{

if(!movie.poster_path) return;

const card=document.createElement("div");
card.classList.add("card");

card.innerHTML=`
<img src="https://image.tmdb.org/t/p/w500${movie.poster_path}">
<p>${movie.title}</p>
`;

card.onclick=()=>{
player.src=`https://vidsrc.to/embed/movie/${movie.id}`;
window.scrollTo({top:0,behavior:"smooth"});
}

moviesDiv.appendChild(card);

});

});

}

loadMovies(`https://api.themoviedb.org/3/trending/movie/week?api_key=${apiKey}`);

document.getElementById("search").addEventListener("keyup",function(){

const q=this.value;

if(q.length>2){

loadMovies(`https://api.themoviedb.org/3/search/movie?api_key=${apiKey}&query=${q}`);

}else{

loadMovies(`https://api.themoviedb.org/3/trending/movie/week?api_key=${apiKey}`);

}

});

</script>

</body>
</html>
